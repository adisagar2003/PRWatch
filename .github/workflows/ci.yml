name: CI

# Run on every pull request, plus pushes to main so the default branch
# always has a known-good signal.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Caches ~/.npm keyed on package-lock.json, so unchanged deps
          # are restored instead of re-downloaded on every run.
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        id: test
        # Emit a JUnit XML report alongside the normal console output. The file
        # is written even when tests fail, so the upload step below can grab it.
        run: npm test -- --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Upload test report
        # Only when the test step itself failed — not when an earlier step
        # (npm ci, typecheck) failed and no report was ever written.
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.junit.xml
          if-no-files-found: error
